include ./theme.conf
# font 
font_family      Maple Mono NF CN
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 16.0
symbol_map U+F0001-U+F1af0 DroidSansM Nerd Font
symbol_map U+F8FF,U+100000-U+1018C7 DroidSansM Nerd Font

scrollback_lines 50000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

copy_on_select clipboard
strip_trailing_spaces smart

shell_integration enabled

enable_audio_bell no

cursor_blink_interval 0
macos_quit_when_last_window_closed no
macos_colorspace default
repaint_delay 8
input_delay 1
resize_draw_strategy blank
remember_window_size no
resize_debounce_time 0.001

# kitty style
hide_window_decorations titlebar-only
window_padding_width 4
background_opacity 0.9
background_blur 16


tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_activity_symbol 
tab_title_max_length 25
tab_title_template "{fmt.fg.red}{bell_symbol}{fmt.fg.tab} {index}: {tab.active_oldest_exe} {activity_symbol}"


#  ____ _____ _   _ _____  
# |  _ \_   _| \ | |  __ \ 
# | |_) || | |  \| | |  | |
# |  _ < | | | . ` | |  | |
# | |_) || |_| |\  | |__| |
# |____/_____|_| \_|_____/ 

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+0 goto_tab 10

map cmd+t launch --type=tab --cwd=current
map cmd+n launch --type=os-window --cwd=current

# splits
map cmd+\ launch --location=vsplit --cwd=current
map cmd+shift+\ launch --location=hsplit --cwd=current
map cmd+] next_window
map cmd+[ previous_window

map cmd+u scroll_page_up
map cmd+d scroll_page_down




# BEGIN_KITTY_THEME
# Catppuccin-Latte
include current-theme.conf
# END_KITTY_THEME

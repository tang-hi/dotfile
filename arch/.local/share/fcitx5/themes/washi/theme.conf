# vim: ft=dosini
[Metadata]
Name=washi
Version=1.0
Author=hayes
Description=Washi — ink on silk-white paper
ScaleWithDPI=True

[InputPanel]
Font=LXGW WenKai 13
Spacing=5

# Unselected candidate text color
NormalColor=#3A3835
# Selected candidate text color
HighlightCandidateColor=#FAFAF7
# Input (preedit) text color
HighlightColor=#56708C
# Input (preedit) background color
HighlightBackgroundColor=#ECECE6

[InputPanel/TextMargin]
Left=20
Right=20
Top=12
Bottom=12

[InputPanel/Background]
# SVG for rounded corners + soft paper shadow
Image=panel.svg

[InputPanel/Background/Margin]
Left=12
Right=12
Top=12
Bottom=12

[InputPanel/Highlight]
# SVG for the rounded indigo selection pill
Image=highlight.svg

[InputPanel/Highlight/Margin]
Left=20
Right=20
Top=12
Bottom=12

[Menu]
Font=Inter 11
NormalColor=#3A3835
Spacing=4

[Menu/Background]
Image=panel.svg

[Menu/Background/Margin]
Left=12
Right=12
Top=12
Bottom=12

[Menu/ContentMargin]
Left=4
Right=4
Top=4
Bottom=4

[Menu/Highlight]
Color=#56708C

[Menu/Highlight/Margin]
Left=12
Right=12
Top=6
Bottom=6

[Menu/Separator]
Color=#E6E6DF

[Menu/CheckBox]
Image=radio.png

[Menu/SubMenu]
Image=arrow.png

[Menu/TextMargin]
Left=8
Right=8
Top=6
Bottom=6

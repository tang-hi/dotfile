# ============================================
# Font Configuration
# ============================================
font_family      Maple Mono NF CN
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 16.0

# ============================================
# Performance
# ============================================
sync_to_monitor yes
repaint_delay 10
input_delay 3

# ============================================
# Cursor
# ============================================
cursor                  #56708C
cursor_text_color       #F7F4EB
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# ============================================
# Scrollback
# ============================================
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# ============================================
# Window
# ============================================
window_padding_width 25
background_opacity 0.88
background_blur 1
hide_window_decorations yes
confirm_os_window_close -1

# Window border colors
active_border_color     #56708C
inactive_border_color   #DBD3C1
bell_border_color       #97783C

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# ============================================
# Tab Bar
# ============================================
tab_bar_style fade
tab_fade 0.6 0.3
tab_title_template " {index}: {title[0:20]} "

active_tab_foreground   #F7F4EB
active_tab_background   #56708C
active_tab_font_style   bold
inactive_tab_foreground #6E695C
inactive_tab_background #E9E4D6
tab_bar_background      none

# ============================================
# Bell
# ============================================
enable_audio_bell no
visual_bell_duration 0.0

# ============================================
# Mouse & Selection
# ============================================
copy_on_select clipboard
strip_trailing_spaces smart
focus_follows_mouse no
mouse_hide_wait 3.0

# URL handling
detect_urls yes
open_url_with default
url_color               #56708C
url_style curly
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh

# ============================================
# Shell Integration
# ============================================
shell_integration enabled

# ============================================
# Colors - Washi (ink on warm paper)
# ============================================
foreground              #3E3A32
background              #F7F4EB
selection_foreground    #3E3A32
selection_background    #E7E0CD

# Colors for marks (marked text in the terminal)
mark1_foreground #F7F4EB
mark1_background #56708C
mark2_foreground #F7F4EB
mark2_background #7D7397
mark3_foreground #F7F4EB
mark3_background #5E8A80

# The 16 terminal colors
# black (light surface, per light-theme convention)
color0 #E9E4D6
color8 #A29B89

# red — shu (rust vermillion)
color1 #A85049
color9 #B25A52

# green — matsuba (pine needle)
color2  #66774F
color10 #74875C

# yellow — karashi (mustard)
color3  #97783C
color11 #A8874A

# blue — ainezu (indigo gray)
color4  #56708C
color12 #67809C

# magenta — fujinezu (wisteria gray)
color5  #7D7397
color13 #8D83A8

# cyan — seiji (celadon)
color6  #5E8A80
color14 #6E9A90

# white (ink)
color7  #4A463E
color15 #3E3A32

# ============================================
# Keyboard Shortcuts
# ============================================

# Special keys
map shift+enter send_text all \e\r

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Tab management
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+left previous_tab
map ctrl+shift+right next_tab
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5

# Window management
map ctrl+shift+enter new_window
map ctrl+shift+n new_os_window
map ctrl+shift+q close_window

# Scrolling
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end
map ctrl+shift+h show_scrollback

# Font size
map ctrl+plus change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0

# Misc
map ctrl+shift+f5 load_config_file
map ctrl+shift+f6 debug_config

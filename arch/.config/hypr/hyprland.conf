exec = gsettings set org.gnome.desktop.interface gtk-theme 'Tela-blue'
exec = gsettings set org.gnome.desktop.interface color-scheme 'prefer-light'


general {
    gaps_in = 3
    gaps_out = 8
    border_size = 2
    layout = dwindle
    resize_on_border = true
}

group {
    # col.border_active = rgba(fabd27cc) rgba(fb4934cc) 45deg

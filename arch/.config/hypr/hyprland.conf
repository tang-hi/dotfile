# calm: ease-out only, no overshoot, no looping gradients
animations {
    enabled = yes
    bezier = washiOut, 0.22, 1, 0.36, 1
    bezier = washiSoft, 0.25, 0.1, 0.25, 1
    animation = windows, 1, 3.5, washiOut, popin 94%
    animation = windowsOut, 1, 3, washiSoft, popin 96%
    animation = windowsMove, 1, 3.5, washiOut, slide
    animation = border, 1, 2, default
    animation = fade, 1, 3, washiSoft
    animation = layers, 1, 2.5, washiOut, fade
    animation = workspaces, 1, 4, washiOut, slidefade 15%
}



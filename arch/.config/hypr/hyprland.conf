# ━━━ Washi — quiet paper light theme ━━━
general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(56708Cbb)
    col.inactive_border = rgba(DBD3C1aa)
    layout = dwindle
    resize_on_border = true
}

group {
    col.border_active = rgba(56708Cbb)
    col.border_inactive = rgba(DBD3C1aa)
}

decoration {
    rounding = 12

    shadow {
        enabled = true
        range = 18
        render_power = 2
        color = rgba(3E3A3222)
        color_inactive = rgba(3E3A3214)
    }

    blur {
        enabled = yes
        size = 6
        passes = 3
        new_optimizations = on
        ignore_opacity = on
        xray = false
    }
}

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.3, match:namespace waybar

# eww dashboard cards
layerrule = blur on, match:namespace gtk-layer-shell
layerrule = ignore_alpha 0.3, match:namespace gtk-layer-shell

# dunst notifications
layerrule = blur on, match:namespace dunst
layerrule = ignore_alpha 0.3, match:namespace dunst

# Rofi blur
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.3, match:namespace rofi


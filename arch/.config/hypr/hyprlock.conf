# ━━━ Washi lock screen ━━━

# BACKGROUND
background {
    monitor =
    path = ~/.config/swww/bridge.jpg
    blur_passes = 2
    blur_size = 5
    brightness = 1.02
}

# GENERAL
general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
    ignore_empty_input = true
}

# INPUT FIELD — frosted paper
input-field {
    monitor =
    size = 280, 56
    outline_thickness = 1
    dots_size = 0.25 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(214, 213, 204, 0.9)
    inner_color = rgba(250, 250, 247, 0.92)
    font_color = rgb(58, 56, 53)
    font_family = Inter
    rounding = 14
    fade_on_empty = false
    placeholder_text = <span foreground="##A19D94">Password</span>
    hide_input = false
    position = 0, -180
    halign = center
    valign = center
    check_color = rgb(86, 112, 140)
    fail_color = rgb(168, 80, 73) # if authentication failed, changes outer_color and fail message color
    fail_text = <b>$ATTEMPTS</b> # can be set to empty
    fail_timeout = 2000 # milliseconds before fail_text and fail_color disappears
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
}

# DATE
label {
  monitor =
  text = cmd[update:60000] LC_ALL=C date +"%A, %B %-d"
  color = rgb(107, 104, 98)
  font_size = 21
  font_family = Inter Medium
  position = 0, 285
  halign = center
  valign = center
}

# TIME
label {
  monitor =
  text = cmd[update:1000] date +"%H:%M"
  color = rgb(58, 56, 53)
  font_size = 96
  font_family = Inter Light
  position = 0, 200
  halign = center
  valign = center
}
